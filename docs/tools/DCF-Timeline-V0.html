<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCF Timeline Generator — FA3</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --amber: #d97706;
    --rose: #be123c;
    --slate: #475569;
    --slate-light: #94a3b8;
    --border: #e2e8f0;
    --bg: #f1f5f9;
    --card: #ffffff;
    --success-bg: #f0fdf4;
    --success-text: #166534;
    --error-bg: #fef2f2;
    --error-text: #991b1b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--navy);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .wrapper { max-width: 1100px; margin: 0 auto; }

  .header { margin-bottom: 24px; }
  .header h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 28px; font-weight: 700; color: var(--navy);
    margin-bottom: 4px;
  }
  .header p { font-size: 13px; color: var(--slate-light); }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 740px) {
    .grid { grid-template-columns: 1fr; }
    .controls { position: static !important; }
  }

  .panel {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .controls { position: sticky; top: 16px; }

  .section-label {
    font-size: 10px; font-weight: 700; color: var(--slate-light);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .divider { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }

  .fields { display: grid; gap: 12px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--slate-light); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%; padding: 8px 10px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; color: var(--navy);
    outline: none; transition: border-color 0.15s;
    background: var(--card);
  }
  .field input:focus, .field select:focus { border-color: var(--teal); }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row-curr { display: grid; grid-template-columns: 62px 1fr; gap: 8px; }

  .toggles { display: grid; gap: 10px; }
  .toggle {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 13px; color: var(--slate);
    user-select: none;
  }
  .toggle input { width: 16px; height: 16px; accent-color: var(--teal); cursor: pointer; }

  .actions { display: grid; gap: 8px; }
  .action-btn {
    padding: 10px 16px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s; color: #fff;
  }
  .action-btn:active { transform: scale(0.97); }
  .btn-teal { background: var(--teal); }
  .btn-teal:hover { background: var(--teal-dark); }
  .btn-navy { background: var(--navy); }
  .btn-navy:hover { background: #0f172a; }

  .toast {
    margin-top: 12px; padding: 8px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 500; text-align: center;
    animation: fadeIn 0.2s; display: none;
  }
  .toast.success { background: var(--success-bg); color: var(--success-text); }
  .toast.error { background: var(--error-bg); color: var(--error-text); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .preview { padding: 16px; overflow-x: auto; }
  .preview svg { width: 100%; height: auto; display: block; min-width: 680px; }

  .footer {
    max-width: 1100px; margin: 16px auto 0;
    font-size: 11px; color: var(--slate-light); text-align: center;
  }

  @media (max-width: 500px) {
    body { padding: 12px 8px; }
    .panel { padding: 16px; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>DCF Timeline Generator</h1>
    <p>Configure parameters → copy or download the timeline for your slides</p>
  </div>

  <div class="grid">
    <div class="panel controls">
      <div class="section-label">Parameters</div>
      <div class="fields">
        <div class="field">
          <label>Title</label>
          <input id="title" value="DCF Timeline">
        </div>
        <div class="row-curr">
          <div class="field">
            <label>Currency</label>
            <select id="currency">
              <option value="€" selected>€</option>
              <option value="$">$</option>
              <option value="£">£</option>
              <option value="¥">¥</option>
              <option value="CHF">CHF</option>
            </select>
          </div>
          <div class="field">
            <label>Face Value</label>
            <input type="number" id="faceValue" value="2000000" step="100000">
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label>Coupon Rate (%)</label>
            <input type="number" id="couponRate" value="6" step="0.5" min="0" max="30">
          </div>
          <div class="field">
            <label>Market Rate (%)</label>
            <input type="number" id="marketRate" value="9" step="0.5" min="0.5" max="30">
          </div>
        </div>
        <div class="field">
          <label>Periods</label>
          <input type="number" id="periods" value="4" min="1" max="12">
        </div>
      </div>

      <hr class="divider">

      <div class="section-label">Display</div>
      <div class="toggles">
        <label class="toggle"><input type="checkbox" id="showPV" checked> Show Present Values</label>
        <label class="toggle"><input type="checkbox" id="showFactors" checked> Show Discount Factors</label>
        <label class="toggle"><input type="checkbox" id="showTotal" checked> Show Totals</label>
      </div>

      <hr class="divider">

      <div class="actions">
        <button class="action-btn btn-teal" onclick="copyAsPNG()">📋 Copy as PNG (3×)</button>
        <button class="action-btn btn-navy" onclick="downloadSVG()">⬇ Download SVG</button>
      </div>
      <div id="toast" class="toast"></div>
    </div>

    <div class="panel preview">
      <div id="svgContainer"></div>
    </div>
  </div>

  <div class="footer">
    Tip: "Copy as PNG" copies a high-res (3×) image — paste directly into PowerPoint with Ctrl+V &nbsp;·&nbsp; FA3 — Financial Accounting 3, Amsterdam Business School
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const inputIds = ["title", "faceValue", "couponRate", "marketRate", "periods", "currency", "showPV", "showFactors", "showTotal"];

inputIds.forEach(id => {
  const el = $(id);
  el.addEventListener("input", render);
  el.addEventListener("change", render);
});

function fmt(n) {
  if (Math.abs(n) >= 1000) return n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function pvF(rate, n) { return 1 / Math.pow(1 + rate, n); }
function pvAF(rate, n) { return (1 - Math.pow(1 + rate, -n)) / rate; }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function render() {
  const title    = $("title").value;
  const faceVal  = parseFloat($("faceValue").value) || 0;
  const couponR  = parseFloat($("couponRate").value) || 0;
  const marketR  = parseFloat($("marketRate").value) || 0.5;
  const periods  = Math.max(1, Math.min(12, parseInt($("periods").value) || 4));
  const curr     = $("currency").value;
  const showPV   = $("showPV").checked;
  const showFact = $("showFactors").checked;
  const showTot  = $("showTotal").checked;

  const rate   = marketR / 100;
  const coupon = faceVal * (couponR / 100);

  const annuityFactor   = pvAF(rate, periods);
  const principalFactor = pvF(rate, periods);
  const pvAnnuity       = coupon * annuityFactor;
  const pvPrincipal     = faceVal * principalFactor;
  const totalPV         = pvAnnuity + pvPrincipal;

  // ── Layout geometry ──
  const padL = 80, padR = 80;
  const colW = Math.min(140, 740 / periods);
  const tlW  = colW * periods;
  const W    = padL + tlW + padR;
  const boxW = colW - 14;
  const boxH = 28;
  const gap  = 6;

  // Space above timeline
  const headerH = 80;
  const aboveSpace = 16 + boxH + gap + boxH + 14; // principal + gap + coupon + padding
  const y0 = headerH + aboveSpace;

  // Space below timeline
  const arrowZone   = showPV ? 50 : 0;
  const pvZone      = showPV ? (boxH + gap + boxH + 20) : 24;
  const formulaH    = (showPV && showFact) ? 96 : 0;
  const totalH      = (showPV && showTot)  ? 62 : 0;

  const H = y0 + arrowZone + pvZone + formulaH + totalH + 16;

  // ── Build SVG ──
  let svg = `<svg id="timelineSVG" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border-radius:12px">`;

  svg += `<defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="ad" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><path d="M0,0 L4,6 L8,0" fill="#475569" opacity="0.4"/></marker>
  </defs>`;

  // ── Title & subtitle ──
  svg += `<text x="${W/2}" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a2744" font-family="'Newsreader',Georgia,serif">${esc(title)}</text>`;
  svg += `<text x="${W/2}" y="50" text-anchor="middle" font-size="11.5" fill="#475569" font-family="'DM Sans',system-ui,sans-serif">Face Value: ${curr}${fmt(faceVal)}  ·  Coupon (i): ${couponR}%  ·  Market Rate (r): ${marketR}%  ·  ${periods} periods</text>`;

  // ── Legend ──
  let lx = padL;
  svg += `<rect x="${lx}" y="${headerH - 16}" width="10" height="10" rx="2" fill="#0d9488"/>`;
  svg += `<text x="${lx+15}" y="${headerH - 7}" font-size="9.5" fill="#475569" font-family="'DM Sans',system-ui,sans-serif">Annuity (Coupon)</text>`;
  lx += 115;
  svg += `<rect x="${lx}" y="${headerH - 16}" width="10" height="10" rx="2" fill="#be123c"/>`;
  svg += `<text x="${lx+15}" y="${headerH - 7}" font-size="9.5" fill="#475569" font-family="'DM Sans',system-ui,sans-serif">Principal</text>`;
  if (showPV) {
    lx += 80;
    svg += `<rect x="${lx}" y="${headerH - 16}" width="10" height="10" rx="2" fill="none" stroke="#d97706" stroke-width="1.2"/>`;
    svg += `<text x="${lx+15}" y="${headerH - 7}" font-size="9.5" fill="#475569" font-family="'DM Sans',system-ui,sans-serif">Present Value</text>`;
  }

  // ── Timeline axis ──
  svg += `<line x1="${padL-10}" y1="${y0}" x2="${padL+tlW+10}" y2="${y0}" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round"/>`;
  svg += `<line x1="${padL}" y1="${y0-6}" x2="${padL}" y2="${y0+6}" stroke="#1a2744" stroke-width="2"/>`;
  svg += `<text x="${padL}" y="${y0+18}" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2744" font-family="'DM Sans',system-ui,sans-serif">0</text>`;

  // ── Per-period elements ──
  for (let i = 0; i < periods; i++) {
    const p = i + 1;
    const x = padL + p * colW;
    const isLast = (i === periods - 1);
    const factor = pvF(rate, p);

    // Tick
    svg += `<line x1="${x}" y1="${y0-6}" x2="${x}" y2="${y0+6}" stroke="#1a2744" stroke-width="2"/>`;
    svg += `<text x="${x}" y="${y0+18}" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2744" font-family="'DM Sans',system-ui,sans-serif">${p}</text>`;

    // ═══ ABOVE TIMELINE: Cash flow boxes ═══
    const couponBoxY = y0 - 14 - boxH;
    svg += `<rect x="${x - boxW/2}" y="${couponBoxY}" width="${boxW}" height="${boxH}" rx="6" fill="#0d9488" filter="url(#sh)"/>`;
    svg += `<text x="${x}" y="${couponBoxY + 18}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="'DM Sans',system-ui,sans-serif">${curr}${fmt(coupon)}</text>`;

    if (isLast) {
      const prinBoxY = couponBoxY - gap - boxH;
      svg += `<rect x="${x - boxW/2}" y="${prinBoxY}" width="${boxW}" height="${boxH}" rx="6" fill="#be123c" filter="url(#sh)"/>`;
      svg += `<text x="${x}" y="${prinBoxY + 18}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="'DM Sans',system-ui,sans-serif">${curr}${fmt(faceVal)}</text>`;
    }

    // ═══ BELOW TIMELINE: Mirrored PV boxes (outlined) ═══
    if (showPV) {
      const arrowStart = y0 + 24;
      const arrowEnd   = y0 + arrowZone - 4;

      // Dashed arrow
      svg += `<line x1="${x}" y1="${arrowStart}" x2="${x}" y2="${arrowEnd}" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#ad)"/>`;

      // Per-period factor on arrow
      if (showFact) {
        const fy = arrowStart + (arrowEnd - arrowStart) * 0.5 + 3;
        svg += `<text x="${x - boxW/2 + 4}" y="${fy}" font-size="7.5" fill="#94a3b8" font-family="'DM Mono',monospace" text-anchor="start">×${factor.toFixed(6)}</text>`;
      }

      // Annuity PV (outlined teal — mirrors coupon box)
      const pvCouponY = arrowEnd + 8;
      const pvCouponVal = coupon * factor;
      svg += `<rect x="${x - boxW/2}" y="${pvCouponY}" width="${boxW}" height="${boxH}" rx="6" fill="rgba(13,148,136,0.05)" stroke="#0d9488" stroke-width="1.3"/>`;
      svg += `<text x="${x}" y="${pvCouponY + 18}" text-anchor="middle" font-size="11" font-weight="600" fill="#0d9488" font-family="'DM Sans',system-ui,sans-serif">${curr}${fmt(pvCouponVal)}</text>`;

      // Principal PV (outlined rose — mirrors principal box, last period only)
      if (isLast) {
        const pvPrinY = pvCouponY + gap + boxH;
        const pvPrinVal = faceVal * factor;
        svg += `<rect x="${x - boxW/2}" y="${pvPrinY}" width="${boxW}" height="${boxH}" rx="6" fill="rgba(190,18,60,0.05)" stroke="#be123c" stroke-width="1.3"/>`;
        svg += `<text x="${x}" y="${pvPrinY + 18}" text-anchor="middle" font-size="11" font-weight="600" fill="#be123c" font-family="'DM Sans',system-ui,sans-serif">${curr}${fmt(pvPrinVal)}</text>`;
      }
    }
  }

  // ═══ FORMULA PANEL ═══
  if (showPV && showFact) {
    const fY = y0 + arrowZone + pvZone;
    const panelW = Math.min(tlW + 60, W - 40);
    const panelX = (W - panelW) / 2;

    svg += `<rect x="${panelX}" y="${fY}" width="${panelW}" height="86" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>`;
    svg += `<text x="${W/2}" y="${fY + 16}" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8" font-family="'DM Sans',system-ui,sans-serif" letter-spacing="0.1em">DISCOUNT FACTORS</text>`;

    // Left: Annuity factor
    const leftX = panelX + panelW * 0.27;
    svg += `<text x="${leftX}" y="${fY + 36}" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488" font-family="'DM Sans',system-ui,sans-serif">PV Annuity Factor</text>`;
    svg += `<text x="${leftX}" y="${fY + 52}" text-anchor="middle" font-size="9.5" fill="#475569" font-family="'DM Mono',monospace">[1 − (1+r)⁻ⁿ] / r</text>`;
    svg += `<text x="${leftX}" y="${fY + 72}" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488" font-family="'DM Mono',monospace">${annuityFactor.toFixed(6)}</text>`;

    // Vertical divider
    svg += `<line x1="${W/2}" y1="${fY + 22}" x2="${W/2}" y2="${fY + 78}" stroke="#e2e8f0" stroke-width="1"/>`;

    // Right: Principal factor
    const rightX = panelX + panelW * 0.73;
    svg += `<text x="${rightX}" y="${fY + 36}" text-anchor="middle" font-size="10" font-weight="600" fill="#be123c" font-family="'DM Sans',system-ui,sans-serif">PV Single Sum Factor</text>`;
    svg += `<text x="${rightX}" y="${fY + 52}" text-anchor="middle" font-size="9.5" fill="#475569" font-family="'DM Mono',monospace">(1+r)⁻ⁿ</text>`;
    svg += `<text x="${rightX}" y="${fY + 72}" text-anchor="middle" font-size="14" font-weight="700" fill="#be123c" font-family="'DM Mono',monospace">${principalFactor.toFixed(6)}</text>`;
  }

  // ═══ TOTAL BAR ═══
  if (showPV && showTot) {
    const tY = y0 + arrowZone + pvZone + formulaH;
    const barW = 400;

    svg += `<line x1="${W/2 - barW/2 + 10}" y1="${tY}" x2="${W/2 + barW/2 - 10}" y2="${tY}" stroke="#1a2744" stroke-width="1.5"/>`;
    svg += `<rect x="${W/2 - barW/2}" y="${tY + 6}" width="${barW}" height="46" rx="8" fill="#1a2744" filter="url(#sh)"/>`;
    svg += `<text x="${W/2}" y="${tY + 25}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="'DM Sans',system-ui,sans-serif">PV Annuity ${curr}${fmt(pvAnnuity)}  +  PV Principal ${curr}${fmt(pvPrincipal)}</text>`;
    svg += `<text x="${W/2}" y="${tY + 44}" text-anchor="middle" font-size="15" font-weight="700" fill="#fff" font-family="'DM Sans',system-ui,sans-serif">Total PV: ${curr}${fmt(totalPV)}</text>`;
  }

  svg += `</svg>`;
  $("svgContainer").innerHTML = svg;
}

// ─── Export: Copy as PNG ───
async function copyAsPNG() {
  const svgEl = document.getElementById("timelineSVG");
  if (!svgEl) return;
  try {
    const svgString = new XMLSerializer().serializeToString(svgEl);
    const canvas = document.createElement("canvas");
    const scale = 3;
    const vb = svgEl.viewBox.baseVal;
    canvas.width = vb.width * scale;
    canvas.height = vb.height * scale;
    const ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    const img = new Image();
    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, vb.width, vb.height);
    ctx.drawImage(img, 0, 0, vb.width, vb.height);
    URL.revokeObjectURL(url);

    canvas.toBlob(async (b) => {
      try {
        await navigator.clipboard.write([ new ClipboardItem({ "image/png": b }) ]);
        showToast("Copied to clipboard!", "success");
      } catch {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "dcf_timeline.png";
        a.click();
        showToast("Downloaded as PNG (clipboard not available)", "success");
      }
    }, "image/png");
  } catch (err) {
    showToast("Error: " + err.message, "error");
  }
}

function downloadSVG() {
  const svgEl = document.getElementById("timelineSVG");
  if (!svgEl) return;
  const svgString = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgString], { type: "image/svg+xml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dcf_timeline.svg";
  a.click();
  showToast("SVG downloaded", "success");
}

function showToast(msg, type) {
  const el = $("toast");
  el.className = "toast " + type;
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2500);
}

render();
</script>
</body>
</html>
